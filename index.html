        function formatEuro(amount) {
            const num = parseFloat(amount).toFixed(2);
            const parts = num.split('.');
            return parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ',' + parts[1] + '€';
        }
        
        function showMotivationToast(message, duration = 6000) {
            if (shownMotivations.has(message)) return;
            shownMotivations.add(message);
            const container = document.getElementById('motivationToasts');
            const toast = document.createElement('div');
            toast.className = 'motivation-toast';
            toast.innerHTML = '<div class="motivation-toast-content"><button class="close-btn" onclick="closeMotivationToast(this.parentElement.parentElement)">✕</button><p class="text-sm text-teal-800 pr-4">' + message + '</p><div class="progress-bar-toast" style="width: 100%"></div></div>';
            container.appendChild(toast);
            const progressBar = toast.querySelector('.progress-bar-toast');
            let width = 100;
            const interval = setInterval(() => { width -= (100 / (duration / 100)); progressBar.style.width = width + '%'; if (width <= 0) clearInterval(interval); }, 100);
            setTimeout(() => closeMotivationToast(toast), duration);
        }
        
        function closeMotivationToast(toast) { if (!toast || toast.classList.contains('hiding')) return; toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); }
        
        function showMotivationMessages() { const messages = getFinancialHealthMessage(); if (messages.length > 0) messages.forEach((msg, index) => setTimeout(() => showMotivationToast(msg, 6000), index * 2000)); }
        
        function loadScript(src) { return new Promise((resolve, reject) => { const script = document.createElement('script'); script.src = src; script.onload = resolve; script.onerror = reject; document.head.appendChild(script); }); }
        
        async function saveToSupabase(table, data) {
            if (!supabaseClient || !state.userId) { syncQueue.push({ table, data, action: 'upsert' }); saveDataLocal();  return false; }
            try { const { error } = await supabaseClient.from(table).upsert(data, { onConflict: table === 'user_config' ? 'user_id' : 'id' }); if (error) throw error; return true; }
            catch (error) { console.error('Error guardando:', error); syncQueue.push({ table, data, action: 'upsert' }); return false; }
        }
        
        async function deleteFromSupabase(table, id) {
            if (!supabaseClient || !state.userId) { syncQueue.push({ table, id, action: 'delete' }); saveDataLocal(); return false; }
            try { const { error } = await supabaseClient.from(table).delete().eq('id', id); if (error) throw error; return true; }
            catch (error) { console.error('Error eliminando:', error); syncQueue.push({ table, id, action: 'delete' }); return false; }

            if (!supabaseClient || !state.userId || syncQueue.length === 0) return;
            const queue = [...syncQueue]; syncQueue = [];

                const index = state.expenses.findIndex(exp => exp.id === state.editingExpenseId);
                if (index !== -1) { const updatedExpense = { id: state.editingExpenseId, user_id: state.userId, description: state.description, amount: parseFloat(state.amount), category: state.category, date: state.date };
                state.expenses[index] = updatedExpense; saveDataLocal(); await saveToSupabase('expenses', updatedExpense); showNotification('✅ Gasto actualizado'); }
                state.editingExpenseId = null;
            } else {
                const newExpense = { id: Date.now(), user_id: state.userId, description: state.description, amount: parseFloat(state.amount), category: state.category, date: state.date };
                state.expenses.unshift(newExpense); saveDataLocal(); await saveToSupabase('expenses', newExpense); showNotification('✅ Gasto añadido');

        function getBalanceInfo() {
            const totalIncome = getTotalIncome();
            const totalExpenses = getTotalMonth();
            const fixedExpenses = getTotalFixedExpenses();
            const monthlyLoanPayments = getTotalMonthlyLoanPayments();
            const rawBalance = totalIncome - totalExpenses - fixedExpenses - monthlyLoanPayments;
            const netSavings = getNetSavings();
            
            if (rawBalance < 0) {
                const deficit = Math.abs(rawBalance);
                const usedFromSavings = Math.min(deficit, Math.max(0, netSavings));
                const adjustedSavings = netSavings - usedFromSavings;
                const remainingDeficit = deficit - usedFromSavings;
                
                return {
                    rawBalance: rawBalance,
                    displayBalance: remainingDeficit > 0 ? -remainingDeficit : 0,
                    usedFromSavings: usedFromSavings,
                    adjustedSavings: adjustedSavings,
                    isUsingFromSavings: usedFromSavings > 0,
                    savingsInsufficient: remainingDeficit > 0
                };
            }
            
            return { rawBalance: rawBalance, displayBalance: rawBalance, usedFromSavings: 0, adjustedSavings: netSavings, isUsingFromSavings: false, savingsInsufficient: false };
        }

        function calculateProjections() {
            const months = parseFloat(state.projectionMonths) || 0; const monthlySavings = parseFloat(state.monthlySavingsPlan) || 0;
            const balanceInfo = getBalanceInfo(); const currentSavings = balanceInfo.adjustedSavings; const owed = getTotalOwed();
            const validMonthlySavings = monthlySavings <= balanceInfo.displayBalance ? monthlySavings : Math.max(0, balanceInfo.displayBalance);
            const projectionFromZero = validMonthlySavings * months; const projectionWithCurrent = currentSavings + projectionFromZero;
            return { fromZero: projectionFromZero, withCurrent: projectionWithCurrent, withoutOwed: projectionWithCurrent, withOwed: projectionWithCurrent + owed };
        }

            const savingsRate = totalIncome > 0 ? (netSavings / totalIncome) * 100 : 0; const typeTotals = getTotalByType();
            let messages = [];
            if (balanceInfo.isUsingFromSavings) {
                messages.push('⚠️ Estás usando ' + formatEuro(balanceInfo.usedFromSavings) + ' de tus ahorros para cubrir gastos');
                if (balanceInfo.savingsInsufficient) messages.push('🚨 ¡Cuidado! Tus ahorros no cubren todo el déficit');
            } else if (savingsRate >= 20) messages.push('🌟 ¡Excelente! Estás ahorrando más del 20% de tus ingresos');
            else if (savingsRate >= 10) messages.push('👍 Buen trabajo, estás ahorrando un ' + savingsRate.toFixed(1) + '%');
            else if (savingsRate > 0) messages.push('⚠️ Intenta aumentar tu tasa de ahorro (actual: ' + savingsRate.toFixed(1) + '%)');
            else if (totalIncome > 0) messages.push('❗ No estás ahorrando este mes');
            if (typeTotals.salida > totalIncome * 0.3) messages.push('💡 Tus gastos en salidas superan el 30%');
            return messages;
        }

            showNotification('📄 PDF descargado');

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    state.expenses = data.expenses || []; 
                    state.savingsWithdrawals = data.savingsWithdrawals || [];
                    state.savingsDeposits = data.savingsDeposits || [];
                    state.debtors = data.debtors || [];
                    state.loans = data.loans || [];
                    state.fixedExpenses = data.fixedExpenses || [];
                    state.savingsHistory = data.savingsHistory || [];
                    state.monthlyIncome = data.monthlyIncome || '';
                    state.creditCardIncome = data.creditCardIncome || ''; 
                    state.projectionMonths = data.projectionMonths || '';
                    state.monthlySavingsPlan = data.monthlySavingsPlan || '';
                    state.bankinterSelected = data.bankinterSelected || [];
                    saveData(); render(); showNotification('✅ Datos importados');
                } catch (error) { showNotification('❌ Error al importar', true); }
            };
            reader.readAsText(file);
        }

                            <div class="mb-3 p-3 bg-orange-50 rounded-lg"><div class="flex justify-between text-xs text-gray-600 mb-1"><span>Deuda total</span><span class="font-semibold text-orange-700">${formatEuro(totalLoans)}</span></div><div class="flex justify-between border-t border-orange-200 pt-2"><span class="text-sm font-medium text-gray-700">Cuota mensual</span><span class="text-sm font-bold text-orange-700">${formatEuro(monthlyLoanPayments)}</span></div></div>
                            <div class="space-y-2 mb-3"><input type="text" id="loanName" value="${state.loanName}" placeholder="Nombre préstamo" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /><div class="grid grid-cols-2 gap-2"><input type="number" id="loanAmount" value="${state.loanAmount}" placeholder="Capital" step="0.01" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /><input type="number" id="loanMonths" value="${state.loanMonths}" placeholder="Meses" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div><input type="number" id="loanPaid" value="${state.loanPaid}" placeholder="Ya pagado (opcional)" step="0.01" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /><div><label class="text-xs text-gray-500 mb-1 block">1ª cuota</label><input type="month" id="loanStartDate" value="${state.loanStartDate}" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div><button onclick="addLoan()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg text-sm">+ Añadir</button></div>
                            ${state.loans.length > 0 ? '<div class="space-y-3">' + state.loans.map(l => { const active = isLoanActive(l); return '<div class="p-3 ' + (active ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200') + ' rounded-lg border"><div class="flex justify-between items-start mb-2"><div class="flex-1 min-w-0"><p class="font-semibold text-sm text-gray-800">' + l.name + '</p><p class="text-xs text-gray-500">' + l.remainingMonths + ' meses</p></div><button onclick="handleDeleteLoan(' + l.id + ')" class="text-gray-400 hover:text-red-500 p-1">🗑️</button></div><div class="flex justify-between text-xs mb-2"><span class="text-gray-500">Pendiente</span><span class="font-bold text-orange-700">' + formatEuro(l.pendingAmount) + '</span></div><div class="w-full bg-gray-200 rounded-full h-1.5 mb-2"><div class="' + (active ? 'bg-orange-500' : 'bg-gray-400') + ' h-1.5 rounded-full" style="width: ' + (l.paidAmount / l.totalAmount) * 100 + '%"></div></div><button onclick="payLoan(' + l.id + ')" class="w-full ' + (active ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-gray-400') + ' text-white py-1.5 rounded text-xs"' + (!active ? ' disabled' : '') + '>✓ Pagar ' + formatEuro(l.monthlyPayment) + '</button></div>'; }).join('') + '</div>' : '<p class="text-gray-400 text-xs text-center py-3">Sin préstamos</p>'}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-5 card animate-slide-in-right border border-gray-100">
                        <button onclick="toggleSection('showDebtorsSection')" class="w-full flex justify-between items-center mb-3"><h2 class="text-base font-semibold text-gray-800">💵 Me Deben</h2><span id="showDebtorsSectionBtn" class="toggle-btn text-lg ${state.showDebtorsSection ? 'open' : ''}">▼</span></button>
                        <div id="showDebtorsSection" class="collapsible-content ${state.showDebtorsSection ? 'open' : ''} custom-scroll">
                            <div class="mb-3 p-3 bg-sky-50 rounded-lg text-center"><p class="text-xs text-gray-500 mb-1">Total pendiente</p><p class="text-xl font-bold text-sky-600">${formatEuro(getTotalOwed())}</p></div>
                            <div class="space-y-2 mb-3"><input type="text" id="debtorName" value="${state.debtorName}" placeholder="Nombre" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /><input type="number" id="debtorAmount" value="${state.debtorAmount}" placeholder="Cantidad" step="0.01" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /><button onclick="addDebtor()" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-2 rounded-lg text-sm">+ Añadir</button></div>
                            ${state.debtors.length > 0 ? '<div class="space-y-2">' + state.debtors.map(d => '<div class="flex justify-between items-center p-2 bg-sky-50 rounded-lg"><div class="flex-1 min-w-0"><p class="font-medium text-xs text-gray-800">' + d.name + '</p><p class="text-xs text-gray-400">' + d.date + '</p></div><div class="flex items-center gap-1 flex-shrink-0"><span class="font-semibold text-sky-600 text-sm">' + formatEuro(d.amount) + '</span><button onclick="remindDebtorWhatsApp(\'' + d.name.replace(/'/g, "\\'") + '\', ' + d.amount + ')" class="text-gray-400 hover:text-green-500 p-1" title="WhatsApp">📱</button><button onclick="handleDeleteDebtor(' + d.id + ')" class="text-gray-400 hover:text-red-500 p-1">🗑️</button></div></div>').join('') + '</div>' : '<p class="text-gray-400 text-xs text-center py-3">Sin deudas</p>'}
                        </div>
                    </div>
                </div>
                <div class="pt-4 border-t border-gray-200"><button onclick="resetMonth()" class="w-full bg-gray-100 hover:bg-red-50 text-gray-500 hover:text-red-600 py-3 rounded-xl text-sm font-medium border border-gray-200 hover:border-red-200">🔄 Reset (nuevo mes) - Guarda ahorros en historial</button></div>
            `;
            
            let saveTimeout = null;
            function debouncedSave() { if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(() => { saveDataLocal(); if (supabaseClient && state.userId) saveToSupabase('user_config', { user_id: state.userId, monthly_income: parseFloat(state.monthlyIncome) || 0, credit_card_income: parseFloat(state.creditCardIncome) || 0, projection_months: parseInt(state.projectionMonths) || 0, monthly_savings_plan: parseFloat(state.monthlySavingsPlan) || 0, dark_mode: state.darkMode, badges: state.badges, savings_history: state.savingsHistory, notes: state.notes, bankinter_selected: state.bankinterSelected }); }, 1000); }
            

            const noteEl = document.getElementById('noteText'); if (noteEl) noteEl.addEventListener('input', (e) => state.noteText = e.target.value);
            ['description', 'amount', 'withdrawalDescription', 'withdrawalAmount', 'depositDescription', 'depositAmount', 'debtorName', 'debtorAmount', 'loanName', 'loanAmount', 'loanMonths', 'loanPaid', 'loanStartDate', 'fixedExpenseName', 'fixedExpenseAmount', 'klarnaName', 'klarnaAmount', 'klarnaMonths', 'klarnaPaid', 'klarnaStartDate'].forEach(id => {
                const el = document.getElementById(id); if (el) el.addEventListener('input', (e) => state[id] = e.target.value); 
            });
            const categoryEl = document.getElementById('category'); if (categoryEl) categoryEl.addEventListener('change', (e) => state.category = e.target.value);
            const dateEl = document.getElementById('date'); if (dateEl) dateEl.addEventListener('change', (e) => state.date = e.target.value);
            setTimeout(() => renderChart(), 100);
        }
        
        async function autoInit() {
            const savedData = localStorage.getItem('expenseTrackerData');
            if (savedData) {
                const data = JSON.parse(savedData);
                Object.assign(state, { 
                    expenses: data.expenses || [], 
                    savingsWithdrawals: data.savingsWithdrawals || [], 
                    savingsDeposits: data.savingsDeposits || [], 
                    debtors: data.debtors || [], 
					notes: data.notes || [],
                    loans: data.loans || [], 
                    fixedExpenses: data.fixedExpenses || [], 
                    savingsHistory: data.savingsHistory || [],
                    monthlyIncome: data.monthlyIncome || '', 
                    creditCardIncome: data.creditCardIncome || '', 
                    projectionMonths: data.projectionMonths || '', 
                    monthlySavingsPlan: data.monthlySavingsPlan || '', 
                    darkMode: data.darkMode || false, 
                    badges: data.badges || [], 
                    lastMonthSavings: data.lastMonthSavings || 0,
                    bankinterSelected: data.bankinterSelected || [],
                    klarnaLoans: data.klarnaLoans || []
                });
                syncQueue = data.syncQueue || [];
            }
            document.body.classList.toggle('dark-mode', state.darkMode);
            if (SUPABASE_CONFIG.url && SUPABASE_CONFIG.anonKey) {
                try {
                    if (!window.supabase) await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
                    supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
                    SUPABASE_CONFIG.initialized = true; isOnline = true;
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session && session.user) {
                        authState.isAuthenticated = true; authState.user = session.user; authState.loading = false; currentUser = session.user; state.userId = session.user.id;
                        await loadDataFromSupabasePublic(); checkBadges(); render();
                        setTimeout(() => showMotivationMessages(), 1500); showNotification('✅ Conectado');
                    } else { authState.isAuthenticated = false; authState.loading = false; renderAuth(); }
                    supabaseClient.auth.onAuthStateChange(async (event, session) => {
                        if (event === 'SIGNED_IN' && session && !authState.isAuthenticated) { authState.isAuthenticated = true; authState.user = session.user; currentUser = session.user; state.userId = session.user.id; await loadDataFromSupabasePublic(); checkBadges(); render(); }
                        else if (event === 'SIGNED_OUT') { authState.isAuthenticated = false; authState.user = null; currentUser = null; state.userId = null; renderAuth(); }
                        else if (event === 'TOKEN_REFRESHED' && session) { /* solo refresh de token, no recargar datos */ }
                    });
                } catch (error) { console.error('Error auto-init:', error); isOnline = false; authState.loading = false; renderAuth(); }
            } else { authState.loading = false; renderAuth(); }
        }

        // ========== FIX #1: loadDataFromSupabasePublic - Supabase es la fuente de verdad ==========
        async function loadDataFromSupabasePublic() {
            if (!supabaseClient || !state.userId) return;
            try {
                // EXPENSES: Supabase es la fuente de verdad
                const { data: expenses } = await supabaseClient.from('expenses').select('*').eq('user_id', state.userId).order('date', { ascending: false });
                if (expenses !== null) {
                    state.expenses = expenses;
                }

                // SAVINGS WITHDRAWALS: Supabase es la fuente de verdad
                const { data: withdrawals } = await supabaseClient.from('savings_withdrawals').select('*').eq('user_id', state.userId).order('date', { ascending: false });
                if (withdrawals !== null) {
                    state.savingsWithdrawals = withdrawals;
                }

                // SAVINGS DEPOSITS: Supabase es la fuente de verdad
                const { data: deposits } = await supabaseClient.from('savings_deposits').select('*').eq('user_id', state.userId).order('date', { ascending: false });
                if (deposits !== null) {
                    state.savingsDeposits = deposits;
                }

                // DEBTORS: Supabase es la fuente de verdad - NO re-añadir locales borrados
                const { data: debtors } = await supabaseClient.from('debtors').select('*').eq('user_id', state.userId).order('date', { ascending: false });
                if (debtors !== null) {
                    state.debtors = debtors;
                }

                // LOANS: Supabase es la fuente de verdad - NO re-añadir locales borrados
                const { data: loans } = await supabaseClient.from('loans').select('*').eq('user_id', state.userId).order('date', { ascending: false });
                if (loans !== null) {
                    state.loans = loans.map(l => ({
                        id: l.id, user_id: l.user_id, name: l.name,
                        totalAmount: l.total_amount, pendingAmount: l.pending_amount,
                        paidAmount: l.paid_amount, totalMonths: l.total_months,
                        remainingMonths: l.remaining_months, monthlyPayment: l.monthly_payment,
                        startDate: l.start_date || (l.date ? l.date.slice(0, 7) : ''),
                        date: l.date
                    }));
                }

                // FIXED EXPENSES: Supabase es la fuente de verdad
                const { data: fixedExpenses } = await supabaseClient.from('fixed_expenses').select('*').eq('user_id', state.userId);
                if (fixedExpenses !== null) {
                    state.fixedExpenses = fixedExpenses;
                }

                // USER CONFIG
                const { data: config } = await supabaseClient.from('user_config').select('*').eq('user_id', state.userId).single();
                if (config) {
                    state.monthlyIncome = config.monthly_income || '';
                    state.creditCardIncome = config.credit_card_income || '';
                    state.projectionMonths = config.projection_months || '';
                    state.monthlySavingsPlan = config.monthly_savings_plan || '';
                    state.darkMode = config.dark_mode || false;
                    state.badges = config.badges || [];
                    state.savingsHistory = config.savings_history || state.savingsHistory || [];
					state.notes = config.notes || [];
                    state.bankinterSelected = config.bankinter_selected || [];
                    state.klarnaLoans = config.klarna_loans || state.klarnaLoans || [];
                }

                state.lastSync = new Date().toISOString();
                saveDataLocal();
                checkBadges();
            } catch (error) {
                console.error('Error cargando datos:', error);
            }
        }

        autoInit();
    </script>
</body>
</html>
